spring.application.name=GateWayService
server.port=8081

eureka.client.service-url.defaultZone=http://localhost:8761/eureka/
eureka.instance.hostname=localhost
eureka.instance.prefer-ip-address=true
#
#spring.cloud.gateway.routes[0].id=auth-service
#spring.cloud.gateway.routes[0].uri=lb://USERSERVICE
#spring.cloud.gateway.routes[0].predicates[0]=Path=/auth/**
#
#
#
#spring.cloud.gateway.routes[2].id=product-service
#spring.cloud.gateway.routes[2].uri=lb://PRODUCT
#spring.cloud.gateway.routes[2].predicates[0]=Path=/pro/**

logging.level.org.springframework.cloud.gateway=DEBUG
logging.level.reactor.netty.http.client=DEBUG

spring.cloud.gateway.discovery.locator.enabled=true
spring.cloud.gateway.discovery.locator.lower-case-service-id=true
#spring.cloud.gateway.routes[1].id=test
#spring.cloud.gateway.routes[1].uri=https://httpbin.org
#spring.cloud.gateway.routes[1].predicates[0]=Path=/test

management.endpoints.web.exposure.include=*

management.endpoint.gateway.enabled=true